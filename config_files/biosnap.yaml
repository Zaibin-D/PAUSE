TRAIN:
  OPTIM:
    BATCH_SIZE: 32
    BASE_EPOCHS: 80
    PRIOR_EPOCHS: 20
    BASE_LR: 1.0e-4
    PRIOR_LR: 1.5e-4
    BACKBONE_LR_SCALE: 0.70
    HEAD_LR_SCALE: 1.0
    WEIGHT_DECAY: 1.0e-4
    ETA_MIN: 1.0e-6
    BASE_PATIENCE: 10
    PRIOR_PATIENCE: 6
    WARMUP_EPOCHS: 4
    GRAD_CLIP_NORM: 1.0
  EVAL:
    USE_MODEL_EMA: true
    MODEL_EMA_DECAY: 0.995
    MODEL_EMA_START_EPOCH: 1
    EMA_USE_FOR_EVAL: true
DATA:
  SPLIT_FILES:
    CLUSTER_TRAIN: source_train
    CLUSTER_VAL: target_train
    CLUSTER_TEST: target_test
  LOADER:
    NUM_WORKERS: 4
MODEL:
  BASE:
    RANK_LOSS_WEIGHT: 0.0
    RANK_LOSS_MARGIN: 0.20
    RANK_LOSS_TEMPERATURE: 1.0
    CONSENSUS_ENABLED: true
    CONSENSUS_VIEW_DROPOUT: 0.05
    CONSENSUS_AGREEMENT_WEIGHT: 0.0

